<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Venn Diagram</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="venn-diagram">
        <svg width="100%" height="100%">
            <circle id="circle1" cx="40%" cy="50%" r="30%" fill="rgba(255,0,0,0.5)" />
            <circle id="circle2" cx="60%" cy="50%" r="30%" fill="rgba(0,0,255,0.5)" />
            <circle id="circle3" cx="50%" cy="70%" r="30%" fill="rgba(0,255,0,0.5)" />
        </svg>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
